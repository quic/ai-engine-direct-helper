/* ── Send button: ripple + launch + particle burst ── */
sendBtn.addEventListener('click', function(e) {
  // Ripple
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = sendBtn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;position:absolute;`;
  sendBtn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Launch animation
  sendBtn.classList.remove('launching');
  void sendBtn.offsetWidth;
  sendBtn.classList.add('launching');
  sendBtn.addEventListener('animationend', () => sendBtn.classList.remove('launching'), { once: true });

  // Particle burst
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 8;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const dist = 28 + Math.random() * 22;
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist;
    const p = document.createElement('span');
    p.className = 'send-particle';
    p.style.cssText = `left:${cx - 3}px;top:${cy - 3}px;--px:${px}px;--py:${py}px;animation-delay:${i * 0.02}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
});

/* ── Copy message ── */
window.copyMsg = function(id) {
  const msg = state.messages.find(m => m.id === id);
  if (msg) {
    navigator.clipboard.writeText(msg.content);
    showToast('Copied to clipboard');
  }
};

/* ── Regen ── */
window.regenMsg = function(id) {
  const idx = state.messages.findIndex(m => m.id === id);
  if (idx < 0) return;
  // Remove from idx onwards
  state.messages.splice(idx);
  renderMessages();
  // Re-send last user message (preserve original file attachments)
  const lastUser = [...state.messages].reverse().find(m => m.role === 'user');
  if (lastUser) {
    state.messages.pop(); // remove last user too
    renderMessages();
    // Pass stored fileInfos so images/audio are correctly re-sent
    sendMessageContent(lastUser.content, null, lastUser.files || []);
  }
};

/* ── Stop generation ── */
// Matches chat.py Chat.stopoutput() → POST /stop
async function stopGeneration() {
  if (state.abortController) {
    state.abortController.abort();
  }
  setGenerating(false);
  showToast('Generation stopped');
  try {
    await fetch(`${API_URL}/stop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: 'stop' }),
      signal: AbortSignal.timeout(3000),
    });
  } catch (e) {
    console.warn('stop output failed:', e);
  }
}

/* ── Set generating state ── */
function setGenerating(val) {
  state.isGenerating = val;
  sendBtn.classList.toggle('hidden', val);
  stopBtn.classList.toggle('hidden', !val);
  msgInput.disabled = val;
  const statusEl = $('tick-status');
  const dotEl = $('status-dot');
  // Toggle thinking glow on all bot avatars (no scale animation to avoid snap on end)
  messagesEl.querySelectorAll('.avatar.bot-avatar').forEach(a => {
    if (val) {
      a.classList.remove('thinking-stop');
      a.classList.add('thinking');
    } else {
      a.classList.remove('thinking');
      a.classList.add('thinking-stop');
      // Remove the stop class after transition completes
      setTimeout(() => a.classList.remove('thinking-stop'), 350);
    }
  });
  if (val) {
    statusEl.textContent = 'GENERATING';
    statusEl.className = 'cmd-seg-value status-busy';
    dotEl && dotEl.classList.add('generating');
  } else {
    statusEl.textContent = 'READY';
    statusEl.className = 'cmd-seg-value status-ready';
    dotEl && dotEl.classList.remove('generating');
  }
}

/* ── Live clock ── */
(function startClock() {
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const el = $('tick-clock');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  setInterval(tick, 1000);
})();

/* ── File reading helpers ── */
function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result); // data:mime;base64,...
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

function isImageFile(file) {
  return /\.(png|jpg|jpeg|gif|webp|bmp)$/i.test(file.name);
}

function isTextFile(file) {
  return /\.(txt|md|py|c|cpp|h|hpp|js|ts|json|xml|csv|log)$/i.test(file.name);
}

function isAudioFile(file) {
  return /\.(wav|mp3|ogg|flac|m4a|aac|webm)$/i.test(file.name);
}

/* ── Send message ── */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text && state.attachedFiles.length === 0) {
    showToast('⚠️ Message cannot be empty', 2500);
    msgInput.focus();
    return;
  }

  // Capture and clear attached files
  const filesToSend = [...state.attachedFiles];
  state.attachedFiles = [];
  renderFilePreview();

  msgInput.value = '';
  msgInput.style.height = 'auto';

  await sendMessageContent(text, filesToSend);
}

/* ── Send message content ── */
// Matches chat.py Chat.chat() → POST /v1/chat/completions (OpenAI-compatible SSE)
// prebuiltFileInfos: optional array of already-processed fileInfo objects (used by Regen)
async function sendMessageContent(text, files, prebuiltFileInfos) {
  if (!state.selectedModel) {
    showToast('⚠️ Please select a model first', 3000);
    return;
  }

  const sysPromptVal = (state.systemPrompt || '').trim();
  if (!sysPromptVal) {
    showToast('⚠️ System Prompt cannot be empty', 2500);
    sysPrompt.focus();
    return;
  }

  // Read files and build file metadata for display
  // If prebuiltFileInfos is provided (e.g. from Regen), skip file reading and use them directly
  const fileInfos = [];
  if (prebuiltFileInfos && prebuiltFileInfos.length > 0) {
    fileInfos.push(...prebuiltFileInfos);
  } else if (files && files.length > 0) {
    for (const f of files) {
      if (isImageFile(f)) {
        const dataUrl = await readFileAsBase64(f);
        // Extract raw base64 (strip data:...;base64, prefix) for API
        const base64Data = dataUrl.split(',')[1] || '';
        fileInfos.push({ name: f.name, isImage: true, dataUrl, base64Data });
      } else if (isAudioFile(f)) {
        const dataUrl = await readFileAsBase64(f);
        // Extract raw base64 (strip data:...;base64, prefix) for API
        const base64Data = dataUrl.split(',')[1] || '';
        fileInfos.push({ name: f.name, isAudio: true, dataUrl, base64Data });
      } else {
        fileInfos.push({ name: f.name, isImage: false, isAudio: false });
      }
    }
  }

  // Add user message to UI
  const userMsg = { role: 'user', content: text, id: `u${++state.msgIdCounter}`, files: fileInfos };
  state.messages.push(userMsg);
  appendMessageEl(userMsg);

  // Add bot placeholder
  const botMsg = { role: 'bot', content: '', id: `b${++state.msgIdCounter}` };
  state.messages.push(botMsg);
  appendMessageEl(botMsg);

  setGenerating(true);
  state.abortController = new AbortController();
  const startTime = Date.now();
  let firstTokenTime = null;

  try {
    // Build messages array: system + full history + current user
    // Matches chat.py: messages = [{role:system,...}, {role:user,...}]
    const messages = [];
    const sysText = state.systemPrompt || 'You are a helpful assistant.';
    messages.push({ role: 'system', content: sysText });

    // Add conversation history (exclude current user+bot pair at end)
    const histMsgs = state.messages.slice(0, -2);
    for (const m of histMsgs) {
      messages.push({ role: m.role === 'bot' ? 'assistant' : 'user', content: m.content });
    }
    // Add current user message — matches backend format:
    // content = {"question": text, "image": base64str, "audio": base64str}
    // (mirrors GenieWebUI.py: service.chat({"question":_question,"image":encoded_img,"audio":encoded_audio}))
    const imgFi = fileInfos.find(fi => fi.isImage);
    const audioFi = fileInfos.find(fi => fi.isAudio);
    if (imgFi || audioFi) {
      // Build text prefix from any attached text files
      let fullText = text;
      for (const fi of fileInfos) {
        if (!fi.isImage && !fi.isAudio && files) {
          const origFile = files.find(f => f.name === fi.name);
          if (origFile && isTextFile(origFile)) {
            try {
              const txt = await readFileAsText(origFile);
              fullText = `[File: ${fi.name}]\n${txt}\n${fullText}`;
            } catch (e) {
              console.warn('Failed to read text file:', fi.name, e);
            }
          }
        }
      }
      messages.push({
        role: 'user',
        content: {
          question: fullText,
          image: imgFi ? imgFi.base64Data : '',
          audio: audioFi ? audioFi.base64Data : ''
        }
      });
    } else {
      messages.push({ role: 'user', content: text });
    }

    // extra_body matches chat.py: {size, temp, top_k, top_p}
    const body = {
      model: state.selectedModel,
      messages,
      stream: true,
      size: state.maxTokens,
      temp: state.temperature,
      top_k: state.topK,
      top_p: state.topP,
    };

    const res = await fetch(`${API_URL}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 123' },
      body: JSON.stringify(body),
      signal: state.abortController.signal,
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // Parse OpenAI-compatible SSE stream
    // Each line: "data: {\"choices\":[{\"delta\":{\"content\":\"...\"},\"finish_reason\":null}]}"
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete last line

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        if (!trimmed.startsWith('data: ')) continue;
        try {
          const json = JSON.parse(trimmed.slice(6));
          const delta = json.choices?.[0]?.delta?.content;
          if (delta != null) {
            if (!firstTokenTime) firstTokenTime = (Date.now() - startTime) / 1000;
            fullContent += delta;
            botMsg.content = fullContent;
            updateBotBubble(botMsg.id, fullContent, true);
            scrollToBottom();
          }
        } catch {}
      }
    }

    // Streaming complete — remove cursor immediately
    updateBotBubble(botMsg.id, fullContent, false);


    // Fetch performance metrics from /profile endpoint
    try {
      const profRes = await fetch(`${API_URL}/profile`);
      if (profRes.ok) {
        const profData = await profRes.json();
        state.metrics = {
          firstLatency: profData.time_to_first_token != null
            ? parseFloat(profData.time_to_first_token).toFixed(2) + 's'
            : null,
          promptSpeed: profData.prompt_processing_rate != null
            ? parseFloat(profData.prompt_processing_rate).toFixed(1) + ' t/s'
            : null,
          evalSpeed: profData.token_generation_rate != null
            ? parseFloat(profData.token_generation_rate).toFixed(1) + ' t/s'
            : null,
        };
        // Also store metrics on the bot message object and update its overlay
        botMsg.metrics = { ...state.metrics };
        updateBotOverlay(botMsg.id, botMsg.metrics);
      }
    } catch (e) {
      console.warn('[metrics] /profile fetch failed:', e);
    }
    updateMetrics();
    // Silently refresh ctx display after each response
    refreshContextSize(true);

  } catch (err) {
    if (err.name !== 'AbortError') {
      botMsg.content = `⚠️ Error: ${err.message}`;
      updateBotBubble(botMsg.id, botMsg.content);
      showToast('Connection error — is the Genie service running?', 3500);
    }
  } finally {
    setGenerating(false);
    state.abortController = null;
    scrollToBottom();
  }
}

/* ── Update metrics display (header command bar) ── */
function updateMetrics() {
  const m = state.metrics;
  const tpsEl = $('tick-tps');
  tpsEl.textContent = m.evalSpeed || '—';
  // Trigger value-flash animation
  tpsEl.classList.remove('updated');
  void tpsEl.offsetWidth; // force reflow
  tpsEl.classList.add('updated');
  tpsEl.addEventListener('animationend', () => tpsEl.classList.remove('updated'), { once: true });
}

/* ── Update per-message bot overlay metrics ── */
function updateBotOverlay(msgId, m) {
  const metricsEl = document.getElementById(`metrics-${msgId}`);
  if (!metricsEl) return;
  metricsEl.classList.remove('loading');
  const pills = metricsEl.querySelectorAll('.bot-metric-pill');
  const data = [m.firstLatency, m.promptSpeed, m.evalSpeed];
  pills.forEach((pill, i) => {
    const val = data[i];
    const valueEl = pill.querySelector('.pill-value');
    if (valueEl) valueEl.textContent = val || '—';
    if (val) {
      pill.classList.remove('no-data');
      // Trigger pill-arrive animation
      pill.classList.remove('has-data');
      void pill.offsetWidth; // force reflow
      pill.classList.add('has-data');
      pill.addEventListener('animationend', () => pill.classList.remove('has-data'), { once: true });
    } else {
      pill.classList.add('no-data');
    }
  });
}

/* ── Init ── */
applyTheme('light');
loadModels();
renderMessages();
msgInput.focus();
// Pre-fill system prompt textarea with default value
sysPrompt.value = state.systemPrompt;
</script>

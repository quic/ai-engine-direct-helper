<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Genie — On-Device AI</title>

<!-- Fonts: Space Mono (terminal) + Fraunces (editorial serif) + DM Sans (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>

<!-- highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/tomorrow-night.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- marked.js — loaded from CDN with inline fallback for offline use -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
// Inline fallback: if CDN marked.js failed to load, provide a minimal renderer
if (typeof marked === 'undefined') {
  window.marked = {
    setOptions: function() {},
    parse: function(text) {
      if (!text) return '';
      // Escape HTML first
      var s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // Code blocks ```...```
      s = s.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      // Inline code `...`
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold **...**
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Italic *...*
      s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // Headers ### ## #
      s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Line breaks
      s = s.replace(/\n/g, '<br>');
      return s;
    }
  };
  console.warn('[Genie] marked.js CDN unavailable — using inline fallback renderer');
}
</script>

<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — "Midnight Carbon" dark theme
   True neutral-dark surfaces + electric sky-blue accent
   Premium developer-tool aesthetic (Linear / Vercel / GitHub Dark)
═══════════════════════════════════════════════════════════════ */
:root {
  /* Surfaces — pure carbon, zero color tint */
  --s0: #0a0a0a;
  --s1: #111111;
  --s2: #1a1a1a;
  --s3: #222222;
  --s4: #2e2e2e;
  --s5: #3a3a3a;

  /* Accent — electric sky blue */
  --a1: #0ea5e9;
  --a1h: #38bdf8;
  --a1d: rgba(14,165,233,0.15);
  --a1dd: rgba(14,165,233,0.07);
  --a1-glow: rgba(14,165,233,0.40);
  --a1-glow2: rgba(14,165,233,0.18);

  /* Gradient partner — deeper cyan */
  --a-grad: #06b6d4;

  /* Accent 2 — warm amber */
  --a2: #f59e0b;
  --a2d: rgba(245,158,11,0.12);

  /* Accent 3 — rose */
  --a3: #f43f5e;
  --a3d: rgba(244,63,94,0.12);

  /* Text — crisp neutral whites */
  --t1: #f8fafc;
  --t2: #94a3b8;
  --t3: #475569;
  --t4: #1e293b;

  /* Borders — neutral white-alpha, no color tint */
  --b1: rgba(255,255,255,0.06);
  --b2: rgba(255,255,255,0.10);
  --b3: rgba(14,165,233,0.30);

  /* Fonts */
  --f-mono: 'Space Mono', 'Courier New', monospace;
  --f-serif: 'Fraunces', Georgia, serif;
  --f-body: 'DM Sans', system-ui, sans-serif;

  /* Sidebar width */
  --sidebar-w: 296px;
  --header-h: 58px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--f-body);
  background: var(--s0);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.4s ease, color 0.4s ease;
}

/* ── Ambient glow orbs ── */
.ambient-orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(80px);
  opacity: 0.07;
  animation: orb-drift 18s ease-in-out infinite;
}

.ambient-orb:nth-child(1) {
  width: 500px;
  height: 500px;
  background: var(--a1);
  top: -120px;
  left: -100px;
  animation-duration: 20s;
}

.ambient-orb:nth-child(2) {
  width: 400px;
  height: 400px;
  background: var(--a-grad);
  bottom: -80px;
  right: -80px;
  animation-duration: 25s;
  animation-delay: -8s;
}

.ambient-orb:nth-child(3) {
  width: 300px;
  height: 300px;
  background: var(--a1);
  top: 40%;
  left: 50%;
  animation-duration: 30s;
  animation-delay: -15s;
  opacity: 0.04;
}

@keyframes orb-drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(20px, 20px) scale(1.02); }
}

html[data-theme="light"] .ambient-orb { opacity: 0.04; }

/* ── Dot grid background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 28px 28px;
}

html[data-theme="light"] body::before {
  background-image: radial-gradient(circle, rgba(37,99,235,0.06) 1px, transparent 1px);
}

/* ── Scanline overlay (dark only) ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.06) 3px,
    rgba(0,0,0,0.06) 4px
  );
}

html[data-theme="light"] body::after { display: none; }

/* ── Smooth theme transitions on key elements ── */
#header, #sidebar, .sidebar-inner, #chat-area, #input-area,
.input-box, .cmd-bar, .bubble, .mode-pill, .new-chat-btn,
.sb-label, .slider-val, .sys-textarea, .metric-card,
.bot-overlay, .msg-action-btn, .bot-act-btn, .icon-btn,
.tool-btn, #send-btn, #stop-btn, .quick-prompt, .empty-title,
.empty-sub, .cmd-seg, .cmd-seg-value, .cmd-seg-label {
  transition-property: background-color, color, border-color, box-shadow;
  transition-duration: 0.35s;
  transition-timing-function: ease;
}

/* ── Page load animation ── */
@keyframes page-fade-in {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

#header {
  animation: page-fade-in 0.5s cubic-bezier(0.4,0,0.2,1) both;
}

#sidebar {
  animation: page-fade-in 0.5s cubic-bezier(0.4,0,0.2,1) 0.08s both;
}

#chat-area {
  animation: page-fade-in 0.5s cubic-bezier(0.4,0,0.2,1) 0.14s both;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s5); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--a1); }

/* ═══════════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════════ */
#app {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
#header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--s0);
  border-bottom: 1px solid var(--b2);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  backdrop-filter: blur(12px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ── Header brand (shown when sidebar is open) ── */
@keyframes brand-slide-in {
  from { opacity: 0; transform: translateX(-14px) scale(0.88); }
  to   { opacity: 1; transform: translateX(0)     scale(1);    }
}
@keyframes brand-slide-out {
  from { opacity: 1; transform: translateX(0)     scale(1);    }
  to   { opacity: 0; transform: translateX(-10px) scale(0.92); }
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 9px;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-14px) scale(0.88);
  transition: none;
  overflow: hidden;
  max-width: 0;
}

.header-brand.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0) scale(1);
  max-width: 200px;
  animation: brand-slide-in 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.hb-mark {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--a1), var(--a-grad));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  box-shadow: 0 0 12px var(--a1-glow2);
}

.hb-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}

.hb-name {
  font-family: var(--f-mono);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: 0.14em;
  line-height: 1;
  white-space: nowrap;
}

.hb-sub {
  font-family: var(--f-mono);
  font-size: 0.48rem;
  color: var(--a1);
  letter-spacing: 0.20em;
  text-transform: uppercase;
  opacity: 0.75;
  line-height: 1;
  white-space: nowrap;
}

/* Light theme overrides */
[data-theme="light"] .hb-name { color: var(--t1); }
[data-theme="light"] .hb-sub  { color: var(--a1); opacity: 0.85; }

/* ── Sidebar logo ── */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 2px 18px;
  border-bottom: 1px solid var(--b2);
  margin-bottom: -4px;
  flex-shrink: 0;
}

.logo-mark {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--a1), var(--a-grad));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
  box-shadow: 0 0 18px var(--a1-glow), 0 0 36px var(--a1-glow2);
  transition: box-shadow 0.3s ease, transform 0.2s ease;
}

.logo-mark:hover {
  box-shadow: 0 0 28px var(--a1-glow), 0 0 56px var(--a1-glow2);
  transform: scale(1.06);
}

.logo-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.logo-text {
  font-family: var(--f-mono);
  font-size: 1.0rem;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: 0.12em;
  line-height: 1;
}

.logo-sub {
  font-family: var(--f-mono);
  font-size: 0.58rem;
  color: var(--a1);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0.8;
  line-height: 1;
}

/* ── Command Bar (header center) ── */
.cmd-bar {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.cmd-seg {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  min-width: 0;
  position: relative;
  transition: background 0.18s;
}

.cmd-seg + .cmd-seg::before {
  content: '';
  position: absolute;
  left: 0;
  top: 20%;
  height: 60%;
  width: 1px;
  background: var(--b2);
}

.cmd-seg:hover {
  background: var(--s2);
}

.cmd-seg-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--t3);
  opacity: 0.7;
}

.cmd-seg-icon svg {
  width: 13px;
  height: 13px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.cmd-seg-body {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.cmd-seg-label {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--t3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}

.cmd-seg-value {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--a1);
  letter-spacing: 0.04em;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}

/* Status segment — color-coded */
.cmd-seg.seg-status {
  padding-left: 12px;
  padding-right: 14px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.6);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}

@keyframes dot-idle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(0.75); }
}

.status-dot.generating {
  background: var(--a1);
  box-shadow: 0 0 10px var(--a1-glow);
  animation: dot-gen 0.7s ease-in-out infinite alternate;
}

@keyframes dot-gen {
  from { opacity: 0.5; transform: scale(0.8); }
  to   { opacity: 1;   transform: scale(1.15); }
}

.cmd-seg-value.status-ready  { color: #22c55e; }
.cmd-seg-value.status-busy   { color: var(--a1); }

/* Model segment — custom dropdown */
.cmd-seg.seg-model {
  cursor: pointer;
  min-width: 0;
  flex: 0 1 auto;
  position: relative;
}

.cmd-seg.seg-model .cmd-seg-label {
  font-size: 0.62rem;
  letter-spacing: 0.08em;
}

/* Custom dropdown trigger */
#model-trigger {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  padding: 0;
  background: none;
  border: none;
  outline: none;
}

#model-trigger-text {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--a1);
  letter-spacing: 0.04em;
  max-width: 180px;
  min-width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1;
  transition: color 0.2s, opacity 0.2s, font-style 0.2s;
}

/* Placeholder state — no model selected */
@keyframes placeholder-breathe {
  0%, 100% { opacity: 0.55; }
  50%       { opacity: 0.85; }
}

#model-trigger-text.placeholder {
  color: var(--t3);
  font-weight: 500;
  font-style: italic;
  letter-spacing: 0.02em;
  animation: placeholder-breathe 2.4s ease-in-out infinite;
}

/* Attention ring on the model segment when no model is selected */
.cmd-seg.seg-model.needs-selection {
  border-radius: 8px;
  box-shadow: 0 0 0 1.5px var(--b3), 0 0 10px var(--a1-glow2);
  animation: seg-attention 2.4s ease-in-out infinite;
}

@keyframes seg-attention {
  0%, 100% { box-shadow: 0 0 0 1.5px var(--b3), 0 0 8px var(--a1-glow2); }
  50%       { box-shadow: 0 0 0 1.5px var(--a1), 0 0 16px var(--a1-glow); }
}

/* Stop attention animation once a model is selected */
.cmd-seg.seg-model:not(.needs-selection) {
  box-shadow: none;
  animation: none;
}

.model-chevron {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  color: var(--t3);
  opacity: 0.6;
  transition: opacity 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.15s;
}

.model-chevron svg {
  width: 10px;
  height: 10px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.cmd-seg.seg-model:hover .model-chevron,
.cmd-seg.seg-model.open .model-chevron {
  opacity: 1;
  color: var(--a1);
}

.cmd-seg.seg-model.open .model-chevron {
  transform: rotate(180deg);
}

.cmd-seg.seg-model:hover #model-trigger-text,
.cmd-seg.seg-model.open #model-trigger-text {
  color: var(--a1);
}

/* Floating dropdown panel */
#model-dropdown {
  position: fixed;
  z-index: 9999;
  min-width: 220px;
  max-width: 320px;
  max-height: 320px;
  overflow-y: auto;
  background: var(--s2);
  border: 1.5px solid var(--b2);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 6px;
  opacity: 0;
  transform: translateY(-6px) scale(0.97);
  pointer-events: none;
  transition: opacity 0.18s cubic-bezier(0.4,0,0.2,1), transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  scrollbar-width: thin;
  scrollbar-color: var(--b3) transparent;
}

#model-dropdown.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

#model-dropdown::-webkit-scrollbar { width: 4px; }
#model-dropdown::-webkit-scrollbar-track { background: transparent; }
#model-dropdown::-webkit-scrollbar-thumb { background: var(--b3); border-radius: 4px; }

.model-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 9px;
  cursor: pointer;
  font-family: var(--f-mono);
  font-size: 0.78rem;
  color: var(--t1);
  letter-spacing: 0.02em;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  position: relative;
}

.model-opt::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--b3);
  flex-shrink: 0;
  transition: background 0.15s, box-shadow 0.15s;
}

.model-opt:hover {
  background: var(--a1dd);
  color: var(--a1);
}

.model-opt:hover::before {
  background: var(--a1);
  box-shadow: 0 0 6px var(--a1-glow);
}

.model-opt.selected {
  background: var(--a1dd);
  color: var(--a1);
  font-weight: 700;
}

.model-opt.selected::before {
  background: var(--a1);
  box-shadow: 0 0 8px var(--a1-glow);
}

.model-opt-loading {
  padding: 12px;
  text-align: center;
  font-family: var(--f-body);
  font-size: 0.75rem;
  color: var(--t3);
  font-style: italic;
}

/* Light theme overrides */
[data-theme="light"] #model-dropdown {
  background: var(--s0);
  border-color: var(--b2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
}

[data-theme="light"] #model-trigger-text {
  color: var(--t1);
}

[data-theme="light"] #model-trigger-text.placeholder {
  color: var(--t3);
  opacity: 0.75;
}

[data-theme="light"] .cmd-seg.seg-model.needs-selection {
  box-shadow: 0 0 0 1.5px rgba(37,99,235,0.35), 0 0 10px rgba(37,99,235,0.12);
}

@keyframes seg-attention-light {
  0%, 100% { box-shadow: 0 0 0 1.5px rgba(37,99,235,0.25), 0 0 8px rgba(37,99,235,0.10); }
  50%       { box-shadow: 0 0 0 1.5px rgba(37,99,235,0.55), 0 0 14px rgba(37,99,235,0.22); }
}

[data-theme="light"] .cmd-seg.seg-model.needs-selection {
  animation: seg-attention-light 2.4s ease-in-out infinite;
}

[data-theme="light"] .cmd-seg.seg-model:hover #model-trigger-text,
[data-theme="light"] .cmd-seg.seg-model.open #model-trigger-text {
  color: var(--a1);
}

[data-theme="light"] .model-opt {
  color: var(--t1);
}

[data-theme="light"] .model-opt:hover {
  background: rgba(37,99,235,0.08);
  color: var(--a1);
}

/* Speed segment */
.cmd-seg.seg-speed .cmd-seg-value {
  max-width: 80px;
}

/* Clock segment */
.cmd-seg.seg-clock {
  padding-right: 14px;
}

.cmd-seg.seg-clock .cmd-seg-value {
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  color: var(--t2);
  font-weight: 600;
}

/* Responsive: hide speed+clock on narrow screens */
@media (max-width: 700px) {
  .cmd-seg.seg-speed,
  .cmd-seg.seg-clock { display: none; }
}

/* ── Light theme: soften cmd-bar contrast ── */
[data-theme="light"] .cmd-bar {
  background: var(--s0);
  border-color: var(--b1);
  box-shadow: 0 1px 6px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.8);
}
[data-theme="light"] .cmd-seg + .cmd-seg::before {
  background: var(--b1);
}
[data-theme="light"] .cmd-seg:hover {
  background: var(--s1);
}
[data-theme="light"] .cmd-seg-label {
  color: var(--t3);
  opacity: 0.9;
}
[data-theme="light"] .cmd-seg-value {
  color: var(--t2);
}
[data-theme="light"] .cmd-seg-icon {
  color: var(--t3);
  opacity: 0.6;
}
/* Status ready: muted green in light mode */
[data-theme="light"] .cmd-seg-value.status-ready {
  color: #16a34a;
}
[data-theme="light"] .status-dot {
  background: #16a34a;
  box-shadow: 0 0 6px rgba(22,163,74,0.35);
}
/* Status busy: use accent but not full saturation */
[data-theme="light"] .cmd-seg-value.status-busy {
  color: var(--a1);
}
/* Clock: use body text color */
[data-theme="light"] .cmd-seg.seg-clock .cmd-seg-value {
  color: var(--t2);
  font-weight: 500;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Icon button ── */
.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  border: 1.5px solid var(--b2);
  background: var(--s1);
  color: var(--t2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  position: relative;
  flex-shrink: 0;
}

.icon-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
  pointer-events: none;
}

.icon-btn:hover {
  background: var(--s3);
  border-color: var(--b3);
  color: var(--t1);
  transform: scale(1.05);
}

.icon-btn:active { transform: scale(0.95); }

.icon-btn.active {
  background: var(--a1d);
  border-color: var(--b3);
  color: var(--a1);
}

/* ── Main layout ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
  position: relative;
  z-index: 5;
}

#sidebar.collapsed {
  width: 0;
  opacity: 0;
  pointer-events: none;
}

.sidebar-inner {
  width: var(--sidebar-w);
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* Sidebar section */
.sb-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sb-label {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sb-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--b2);
}


/* Mode pills */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.mode-pill {
  padding: 9px 10px;
  border-radius: 9px;
  border: 1.5px solid var(--b1);
  background: var(--s2);
  color: var(--t2);
  font-family: var(--f-body);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s ease;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.mode-pill:hover {
  border-color: var(--b3);
  color: var(--t1);
  background: var(--s3);
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.mode-pill:active { transform: translateY(0); }

.mode-pill.active {
  background: var(--a1d);
  border-color: var(--b3);
  color: var(--a1);
  box-shadow: 0 0 12px var(--a1-glow2);
}

/* Slider */
.slider-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slider-label {
  font-family: var(--f-body);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: 0.01em;
}

.slider-val {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--a1);
  background: var(--a1dd);
  border: 1px solid var(--b2);
  border-radius: 5px;
  padding: 2px 8px;
  min-width: 42px;
  text-align: center;
  font-weight: 700;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--s4);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
  transition: background 0.15s;
}

input[type=range]:hover { background: var(--s5); }

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--a1);
  border: 2px solid var(--s1);
  box-shadow: 0 0 0 2px var(--a1), 0 0 10px var(--a1-glow);
  transition: transform 0.15s, box-shadow 0.15s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.25);
  box-shadow: 0 0 0 3px var(--a1), 0 0 16px var(--a1-glow);
}

/* System prompt */
.sys-textarea {
  width: 100%;
  background: var(--s2);
  border: 1.5px solid var(--b2);
  border-radius: 10px;
  color: var(--t1);
  font-family: var(--f-body);
  font-size: 0.84rem;
  line-height: 1.65;
  padding: 12px 14px;
  resize: vertical;
  outline: none;
  min-height: 38px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.sys-textarea:focus {
  border-color: var(--a1);
  box-shadow: 0 0 0 3px var(--a1dd);
}

.sys-textarea:hover { border-color: var(--b3); }
.sys-textarea::placeholder { color: var(--t3); font-style: italic; }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.metric-card {
  background: var(--s2);
  border: 1.5px solid var(--b1);
  border-radius: 10px;
  padding: 12px 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  transition: border-color 0.15s, background 0.15s;
}

.metric-card:hover {
  border-color: var(--b2);
  background: var(--s3);
}

.metric-name {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.metric-value {
  font-family: var(--f-mono);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--a1);
  letter-spacing: -0.02em;
}

/* Theme swatches */
.theme-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.theme-swatch {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s ease;
  position: relative;
  overflow: hidden;
}

.theme-swatch:hover { transform: scale(1.1); }
.theme-swatch.active { border-color: var(--a1); box-shadow: 0 0 8px var(--a1); }

/* New chat button */
.new-chat-btn {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--b3);
  background: linear-gradient(135deg, var(--a1dd), transparent);
  color: var(--a1);
  font-family: var(--f-body);
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

.new-chat-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--a1d), transparent);
  opacity: 0;
  transition: opacity 0.18s;
}

.new-chat-btn:hover::before { opacity: 1; }

.new-chat-btn:hover {
  border-color: var(--a1);
  box-shadow: 0 0 20px var(--a1-glow2), 0 4px 16px rgba(0,0,0,0.2);
  transform: translateY(-1px);
}

.new-chat-btn:active { transform: translateY(0); }

/* ═══════════════════════════════════════════════════════════════
   CHAT AREA
═══════════════════════════════════════════════════════════════ */
#chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--s0);
  position: relative;
}

/* Messages container */
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 0 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}

/* Empty state */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  text-align: center;
  gap: 32px;
}

/* Staggered entrance for empty state children */
#empty-state > * {
  animation: empty-rise 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* empty-state children: hero, quick-prompts */
#empty-state > *:nth-child(1) { animation-delay: 0.05s; }
#empty-state > *:nth-child(2) { animation-delay: 0.5s; }

@keyframes empty-rise {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Hero: logo + title + subtitle stacked vertically */
.empty-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: empty-rise 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.08s both;
}

.empty-hero .empty-logo-wrap { margin-bottom: 24px; }
.empty-hero .empty-title     { margin-bottom: 16px; }
.empty-hero .empty-sub       { margin-bottom: 0; }

/* Wrapper handles the entrance animation only */
.empty-logo-wrap {
  animation: none;
  position: relative;
  z-index: 1;
}

.empty-logo {
  width: 80px;
  height: 80px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--a1), var(--a-grad));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  position: relative;
  box-shadow: 0 0 48px var(--a1-glow), 0 0 96px var(--a1-glow2), 0 8px 32px rgba(0,0,0,0.3);
  animation: genie-bob 3.6s ease-in-out infinite;
}

/* Soft static halo ring around the logo */
.empty-logo::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 32px;
  background: radial-gradient(ellipse at center, var(--a1-glow2) 0%, transparent 70%);
  opacity: 0.6;
  animation: halo-breathe 4s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}

@keyframes halo-breathe {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%       { opacity: 0.75; transform: scale(1.12); }
}

@keyframes genie-bob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

/* ── Empty state: title + subtitle below the logo ── */
.empty-title {
  font-family: var(--f-serif);
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  font-weight: 300;
  color: var(--t1);
  letter-spacing: -0.02em;
  line-height: 1.1;
  animation: empty-rise 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.28s both;
}

.empty-title em {
  font-style: italic;
  font-weight: 900;
  background: linear-gradient(135deg, var(--a1) 0%, var(--a-grad) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  padding-right: 0.04em; /* prevent clip cutoff */
}

.empty-sub {
  font-family: var(--f-body);
  font-size: 1rem;
  font-weight: 300;
  color: var(--t2);
  max-width: 400px;
  line-height: 1.75;
  letter-spacing: 0.01em;
  animation: empty-rise 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.38s both;
}

.quick-prompts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  max-width: 560px;
  width: 100%;
}

.quick-prompt {
  padding: 14px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--b1);
  background: var(--s1);
  color: var(--t2);
  font-size: 0.82rem;
  line-height: 1.45;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
}

.quick-prompt::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--a1d), transparent);
  opacity: 0;
  transition: opacity 0.18s;
}

/* Shimmer sweep on hover */
.quick-prompt::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  transform: skewX(-20deg);
  transition: left 0.5s ease;
  pointer-events: none;
}

.quick-prompt:hover::after { left: 150%; }

.quick-prompt:hover {
  border-color: var(--b3);
  color: var(--t1);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25), 0 0 0 1px var(--b2);
}

.quick-prompt:hover::before { opacity: 1; }
.quick-prompt:active { transform: translateY(0) scale(0.98); }

/* Staggered entrance for quick prompts */
.quick-prompt:nth-child(1) { animation: empty-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.38s both; }
.quick-prompt:nth-child(2) { animation: empty-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.46s both; }
.quick-prompt:nth-child(3) { animation: empty-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.54s both; }
.quick-prompt:nth-child(4) { animation: empty-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.62s both; }

.quick-prompt-icon {
  font-size: 1.1rem;
  margin-bottom: 6px;
  display: block;
}

/* ── Message rows ── */
.msg-row {
  display: flex;
  padding: 8px 28px;
  gap: 14px;
  animation: msg-appear 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  position: relative;
}

@keyframes msg-appear {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row.user {
  animation-name: msg-appear-user;
}

@keyframes msg-appear-user {
  from { opacity: 0; transform: translateX(12px) scale(0.98); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}

.msg-row.user { justify-content: flex-end; }
.msg-row.bot  { justify-content: flex-start; }

/* Avatar */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  margin-top: 2px;
}

.avatar.bot-avatar {
  background: linear-gradient(135deg, var(--a1), var(--a-grad));
  box-shadow: 0 0 14px var(--a1-glow2), 0 2px 8px rgba(0,0,0,0.3);
}

.avatar.user-avatar {
  background: var(--s4);
  border: 1.5px solid var(--b2);
  font-size: 12px;
  font-family: var(--f-mono);
  color: var(--t2);
}

/* Bubble */
.bubble {
  max-width: min(72%, 680px);
  border-radius: 16px;
  padding: 12px 16px;
  font-size: 0.9rem;
  line-height: 1.72;
  position: relative;
}

.bubble.user-bubble {
  background: var(--s3);
  border: 1.5px solid var(--b2);
  border-bottom-right-radius: 5px;
  color: var(--t1);
  word-break: break-word;
  max-width: 100%;   /* wrapper already constrains max-width */
  min-width: 60px;   /* prevent collapsing to single-char width */
  width: max-content; /* size to text, capped by wrapper max-width */
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.bubble.bot-bubble {
  background: transparent;
  border: none;
  border-bottom-left-radius: 5px;
  color: var(--t1);
  padding-left: 0;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 14px 4px;
}

.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--t3);
  animation: typing-bounce 1.5s cubic-bezier(0.4,0,0.2,1) infinite;
}

.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.18s; }
.typing-dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0) scale(1); background: var(--t3); }
  30% { transform: translateY(-8px) scale(1.2); background: var(--a1); box-shadow: 0 0 8px var(--a1-glow); }
}

/* Streaming cursor */
.stream-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--a1);
  margin-left: 2px;
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: cursor-blink 0.9s step-end infinite;
  box-shadow: 0 0 6px var(--a1-glow);
}

@keyframes cursor-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── Markdown body ── */
.md-body { font-family: var(--f-body); font-size: 0.92rem; }
.md-body h1 { font-family: var(--f-serif); font-size: 1.45em; font-weight: 600; margin: 1.1em 0 0.45em; letter-spacing: -0.02em; }
.md-body h2 { font-family: var(--f-serif); font-size: 1.25em; font-weight: 600; margin: 1em 0 0.4em; }
.md-body h3 { font-size: 1.05em; font-weight: 600; margin: 0.9em 0 0.35em; color: var(--a1); }
.md-body p  { margin: 0 0 0.8em; }
.md-body p:last-child { margin-bottom: 0; }
.md-body ul, .md-body ol { padding-left: 1.6em; margin: 0.5em 0 0.8em; }
.md-body li { margin: 0.3em 0; }
.md-body strong { color: var(--t1); font-weight: 600; }
.md-body em { color: var(--t2); font-style: italic; }
.md-body a { color: var(--a1); text-decoration: underline; text-underline-offset: 3px; }
.md-body hr { border: none; border-top: 1px solid var(--b2); margin: 1.2em 0; }

.md-body code {
  font-family: var(--f-mono);
  font-size: 0.8em;
  background: var(--s3);
  border: 1px solid var(--b2);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--a1);
}

.md-body pre {
  background: var(--s1) !important;
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0.75em 0;
  position: relative;
}

.md-body pre code {
  background: transparent !important;
  border: none !important;
  padding: 0 !important;
  font-size: 0.8rem;
  color: var(--t1) !important;
}

.md-body blockquote {
  border-left: 2px solid var(--a1);
  padding-left: 1em;
  margin: 0.75em 0;
  color: var(--t2);
  font-style: italic;
}

.md-body table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 0.85em; }
.md-body th, .md-body td { border: 1px solid var(--b1); padding: 7px 12px; text-align: left; }
.md-body th { background: var(--s2); font-weight: 600; font-family: var(--f-mono); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--t2); }

/* Code copy button */
.code-copy {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--s3);
  border: 1px solid var(--b2);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  color: var(--t2);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  letter-spacing: 0.04em;
}

pre:hover .code-copy { opacity: 1; }
.code-copy:hover { color: var(--a1); background: var(--a1dd); }

/* ── Message actions (user bubble — simple copy) ── */
.msg-actions {
  display: flex;
  gap: 5px;
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.18s;
}

.msg-row:hover .msg-actions { opacity: 1; }

.msg-action-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--b2);
  background: var(--s1);
  color: var(--t3);
  font-family: var(--f-mono);
  font-size: 0.65rem;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.03em;
}

.msg-action-btn:hover {
  border-color: var(--b3);
  color: var(--a1);
  background: var(--a1dd);
}

/* ── Bot message overlay — floats below bubble on hover ── */
.bot-msg-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 1;
  min-width: 0;
}

.bot-overlay {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  padding: 6px 10px 6px 8px;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.12);
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.22s cubic-bezier(.4,0,.2,1), transform 0.22s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  width: fit-content;
  max-width: 100%;
}

.msg-row:hover .bot-overlay {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Action buttons zone */
.bot-overlay-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.bot-act-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 8px;
  border: 1px solid var(--b2);
  background: var(--s2);
  color: var(--t2);
  font-family: var(--f-mono);
  font-size: 0.64rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.14s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}

.bot-act-btn svg {
  flex-shrink: 0;
  opacity: 0.75;
  transition: opacity 0.14s;
}

.bot-act-btn:hover {
  border-color: var(--a1);
  color: var(--a1);
  background: var(--a1dd);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px var(--a1-glow2);
}

.bot-act-btn:hover svg { opacity: 1; }

.bot-act-btn:active { transform: translateY(0); }

/* Divider between actions and metrics */
.bot-overlay-divider {
  width: 1px;
  height: 22px;
  background: var(--b2);
  flex-shrink: 0;
}

/* Metrics zone */
.bot-overlay-metrics {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}

.bot-metric-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--s3);
  border: 1px solid var(--b1);
  font-family: var(--f-mono);
  font-size: 0.6rem;
  color: var(--t3);
  white-space: nowrap;
  transition: background 0.14s, color 0.14s;
}

.bot-metric-pill .pill-label {
  color: var(--t3);
  opacity: 0.7;
  font-size: 0.56rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.bot-metric-pill .pill-value {
  color: var(--a1);
  font-weight: 600;
  font-size: 0.62rem;
}

.bot-metric-pill.no-data .pill-value {
  color: var(--t3);
  font-weight: 400;
}

/* Waiting state — metrics not yet loaded */
.bot-overlay-metrics.loading .bot-metric-pill .pill-value {
  color: var(--t3);
  animation: metric-pulse 1.4s ease-in-out infinite;
}

@keyframes metric-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ═══════════════════════════════════════════════════════════════
   INPUT BAR — Command Deck redesign
═══════════════════════════════════════════════════════════════ */
#input-area {
  padding: 10px 20px 18px;
  flex-shrink: 0;
  position: relative;
}

/* Gradient fade above input */
#input-area::before {
  content: '';
  position: absolute;
  top: -48px;
  left: 0;
  right: 0;
  height: 48px;
  background: linear-gradient(to top, var(--s0), transparent);
  pointer-events: none;
}

/* Outer shell — the "Command Deck" */
.input-box {
  background: var(--s1);
  border: 1.5px solid var(--b2);
  border-radius: 18px;
  padding: 0;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.input-box:focus-within {
  border-color: var(--b3);
  box-shadow: 0 0 0 3px var(--a1dd), 0 4px 32px var(--a1-glow2);
  animation: input-focus-pulse 0.4s cubic-bezier(0.4,0,0.2,1);
}

@keyframes input-focus-pulse {
  0%   { box-shadow: 0 0 0 0 var(--a1-glow), 0 4px 32px var(--a1-glow2); }
  50%  { box-shadow: 0 0 0 6px var(--a1dd), 0 4px 32px var(--a1-glow); }
  100% { box-shadow: 0 0 0 3px var(--a1dd), 0 4px 32px var(--a1-glow2); }
}

/* File preview strip — sits at the top of the box */
#file-preview {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 14px 4px;
  align-items: flex-end;
}

#file-preview.has-files { display: flex; }

/* ── Image preview card ── */
.prev-img-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid var(--b2);
  background: var(--s2);
  flex-shrink: 0;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}

.prev-img-card:hover {
  border-color: var(--a1);
  box-shadow: 0 0 0 2px var(--a1dd);
}

.prev-img-card img {
  display: block;
  width: 72px;
  height: 72px;
  object-fit: cover;
}

/* ── Audio preview card ── */
.prev-audio-card {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--s2);
  border: 1.5px solid var(--b2);
  border-radius: 10px;
  padding: 8px 10px 6px;
  min-width: 160px;
  max-width: 220px;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.prev-audio-card:hover {
  border-color: var(--a1);
  box-shadow: 0 0 0 2px var(--a1dd);
}

.prev-audio-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--t2);
  overflow: hidden;
}

.prev-audio-label svg {
  width: 12px;
  height: 12px;
  stroke: var(--a1);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

.prev-audio-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.prev-audio-card audio {
  width: 100%;
  height: 28px;
  outline: none;
  border-radius: 6px;
  accent-color: var(--a1);
}

/* ── Generic file chip ── */
.file-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--s2);
  border: 1.5px solid var(--b2);
  border-radius: 10px;
  padding: 6px 10px;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  color: var(--t2);
  max-width: 180px;
  transition: background 0.12s, border-color 0.15s;
}

.file-chip:hover {
  background: var(--s3);
  border-color: var(--a1);
}

.file-chip-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Shared remove button ── */
.prev-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  font-size: 10px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  z-index: 2;
}

.prev-img-card:hover .prev-remove,
.prev-audio-card:hover .prev-remove,
.file-chip:hover .prev-remove { opacity: 1; }

.prev-remove:hover { background: rgba(220,38,38,0.85); }

/* Inline remove for file chips (not absolute) */
.file-chip .prev-remove {
  position: static;
  opacity: 1;
  background: transparent;
  border: none;
  color: var(--t3);
  font-size: 11px;
  width: auto;
  height: auto;
  border-radius: 0;
  flex-shrink: 0;
}

.file-chip .prev-remove:hover {
  background: transparent;
  color: var(--a3);
}

/* Main input row: attach | textarea | send */
.input-main-row {
  display: flex;
  align-items: flex-end;
  gap: 0;
  padding: 12px 12px 10px;
}

/* Textarea */
#msg-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--t1);
  font-family: var(--f-body);
  font-size: 0.92rem;
  line-height: 1.65;
  resize: none;
  min-height: 28px;
  max-height: 220px;
  overflow-y: auto;
  padding: 4px 10px;
  align-self: center;
}

#msg-input::placeholder { color: var(--t3); }

/* Attach button — left side of input row */
.tool-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--b2);
  background: var(--s2);
  color: var(--t2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s ease;
}

.tool-btn:hover {
  background: var(--s3);
  border-color: var(--b3);
  color: var(--a1);
  transform: scale(1.05);
}

.tool-btn:active { transform: scale(0.96); }

.tool-btn svg {
  width: 17px;
  height: 17px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* Send button — right side of input row */
#send-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--a1), var(--a-grad));
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.18s ease;
  box-shadow: 0 2px 14px var(--a1-glow);
  position: relative;
  overflow: hidden;
}

#send-btn svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
  transition: transform 0.15s ease;
}

#send-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 6px 24px var(--a1-glow);
}

#send-btn:hover svg { transform: translateX(1px) translateY(-1px); }

#send-btn:active { transform: scale(0.92); }

/* Ripple effect for send button */
#send-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: ripple-expand 0.5s linear;
  pointer-events: none;
}

@keyframes ripple-expand {
  to { transform: scale(4); opacity: 0; }
}

#send-btn:disabled {
  background: var(--s3);
  color: var(--t3);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

#send-btn:disabled svg { stroke: var(--t3); }

/* Stop button */
#stop-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1.5px solid var(--a3);
  background: var(--a3d);
  color: var(--a3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s ease;
}

#stop-btn svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
  flex-shrink: 0;
}

#stop-btn:hover {
  background: rgba(255,77,109,0.2);
  box-shadow: 0 0 16px rgba(255,77,109,0.35);
  transform: scale(1.05);
}

#stop-btn:active { transform: scale(0.92); }

.hidden { display: none !important; }

/* Input hint (legacy, kept for compat) */
.input-hint {
  font-family: var(--f-mono);
  font-size: 0.58rem;
  color: var(--t3);
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════════════════
   THEME VARIANTS
═══════════════════════════════════════════════════════════════ */

/* ── Light / "Paper & Ink" theme ── */
[data-theme="light"] {
  /* Surfaces — warm paper */
  --s0: #faf9f7;
  --s1: #f3f1ed;
  --s2: #eae7e1;
  --s3: #dedad3;
  --s4: #cdc9c1;
  --s5: #b8b4ac;

  /* Accent — deep ink blue (WCAG AA on white) */
  --a1: #2563eb;
  --a1h: #1d4ed8;
  --a1d: rgba(37,99,235,0.10);
  --a1dd: rgba(37,99,235,0.05);
  --a1-glow: rgba(37,99,235,0.22);
  --a1-glow2: rgba(37,99,235,0.10);

  /* Gradient partner — indigo */
  --a-grad: #4f46e5;

  /* Text — rich ink */
  --t1: #111827;
  --t2: #4b5563;
  --t3: #9ca3af;
  --t4: #d1d5db;

  /* Borders */
  --b1: rgba(0,0,0,0.07);
  --b2: rgba(0,0,0,0.13);
  --b3: rgba(37,99,235,0.25);
}

/* ═══════════════════════════════════════════════════════════════
   NOTIFICATION TOAST
═══════════════════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--s3);
  border: 1.5px solid var(--b3);
  border-radius: 12px;
  padding: 11px 22px;
  font-family: var(--f-body);
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--t1);
  z-index: 1000;
  opacity: 0;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px var(--b1);
  backdrop-filter: blur(12px);
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --sidebar-w: 100vw; }
  #sidebar { position: absolute; top: 0; left: 0; height: 100%; z-index: 20; }
  .status-ticker { display: none; }
  .quick-prompts { grid-template-columns: 1fr; }
}

/* ── Scrollbar for messages ── */
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--s4); }
#messages::-webkit-scrollbar-thumb:hover { background: var(--a1); }

/* ── Scroll-to-bottom FAB ── */
#scroll-fab {
  position: absolute;
  bottom: 90px;
  right: 20px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--s2);
  border: 1.5px solid var(--b3);
  color: var(--a1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 12px var(--a1-glow2);
  opacity: 0;
  transform: translateY(8px) scale(0.85);
  transition: opacity 0.22s cubic-bezier(0.34,1.56,0.64,1), transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
  pointer-events: none;
  z-index: 10;
  backdrop-filter: blur(8px);
}

#scroll-fab.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

#scroll-fab:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 20px var(--a1-glow);
  transform: translateY(-1px) scale(1.05);
}

#scroll-fab:active { transform: scale(0.92); }

#scroll-fab svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── Code block language label ── */
.code-lang-label {
  position: absolute;
  top: 10px;
  left: 14px;
  font-family: var(--f-mono);
  font-size: 0.6rem;
  color: var(--t3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.6;
  pointer-events: none;
  user-select: none;
}

pre:hover .code-lang-label { opacity: 0.9; }

/* ── Selection ── */
::selection { background: var(--a1d); color: var(--a1); }

/* ═══════════════════════════════════════════════════════════════
   MOTION LAYER — Dynamic effects for liveliness
═══════════════════════════════════════════════════════════════ */

/* ── 1. Send button: animated gradient shimmer when active ── */
@keyframes send-shimmer {
  0%   { background-position: 200% center; }
  100% { background-position: -200% center; }
}

#send-btn:not(:disabled) {
  background: linear-gradient(
    135deg,
    var(--a1) 0%,
    var(--a-grad) 40%,
    var(--a1) 60%,
    var(--a-grad) 100%
  );
  background-size: 300% 100%;
  animation: send-shimmer 3.5s linear infinite;
}

#send-btn:not(:disabled):hover {
  animation-duration: 1.5s;
}

/* ── 2. Bot avatar: glow pulse + entrance pop ── */
@keyframes avatar-glow {
  0%, 100% { box-shadow: 0 0 10px var(--a1-glow2), 0 2px 8px rgba(0,0,0,0.3); }
  50%       { box-shadow: 0 0 22px var(--a1-glow),  0 2px 8px rgba(0,0,0,0.3); }
}

@keyframes avatar-pop-in {
  0%   { opacity: 0; transform: scale(0) rotate(-30deg); }
  60%  { opacity: 1; transform: scale(1.2) rotate(8deg); }
  80%  { transform: scale(0.92) rotate(-4deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.avatar.bot-avatar {
  /* pop-in is triggered via .popping class added once by JS */
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.avatar.bot-avatar.popping {
  animation: avatar-pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}


/* While generating: avatar has a subtle glow (no scale change to avoid snap on end) */
.avatar.bot-avatar.thinking {
  box-shadow: 0 0 18px var(--a1-glow);
  transition: box-shadow 0.3s ease;
}

.avatar.bot-avatar.thinking-stop {
  box-shadow: none;
  transition: box-shadow 0.3s ease;
}

/* ── 3. New-chat button: animated gradient border sweep ── */
@keyframes new-chat-sweep {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.new-chat-btn {
  background: linear-gradient(
    270deg,
    var(--a1dd),
    var(--a1d),
    transparent,
    var(--a1dd)
  );
  background-size: 400% 400%;
  animation: new-chat-sweep 5s ease infinite;
}

.new-chat-btn:hover {
  animation-duration: 2s;
}

/* ── 4. Theme cycle button: rotation on hover ── */
#theme-cycle-btn {
  transition: all 0.15s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

#theme-cycle-btn:hover {
  transform: scale(1.05) rotate(30deg);
}

#theme-cycle-btn:active {
  transform: scale(0.95) rotate(180deg);
  transition: transform 0.25s ease;
}

/* ── 5. hb-mark: continuous glow pulse when brand is visible ── */
@keyframes hb-glow-pulse {
  0%, 100% { box-shadow: 0 0 8px var(--a1-glow2); }
  50%       { box-shadow: 0 0 20px var(--a1-glow), 0 0 36px var(--a1-glow2); }
}

.header-brand.visible .hb-mark {
  animation: hb-glow-pulse 2.5s ease-in-out infinite;
}

/* ── 6. Scroll-to-bottom FAB: gentle bob when visible ── */
@keyframes fab-bob {
  0%, 100% { transform: translateY(0) scale(1); }
  50%       { transform: translateY(-3px) scale(1.02); }
}

#scroll-fab.visible {
  animation: fab-bob 2.2s ease-in-out infinite;
}

#scroll-fab.visible:hover {
  animation: none;
  transform: translateY(-2px) scale(1.08);
}

/* ── 7. Cmd-bar: shimmer sweep on hover ── */
@keyframes cmd-shimmer {
  from { transform: translateX(-100%) skewX(-15deg); }
  to   { transform: translateX(400%) skewX(-15deg); }
}

.cmd-bar::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 25%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

.cmd-bar:hover::after {
  opacity: 1;
  animation: cmd-shimmer 1.2s ease forwards;
}

/* ── 7b. Send button: launch burst on click ── */
@keyframes send-launch {
  0%   { transform: scale(1) translateY(0); }
  30%  { transform: scale(0.88) translateY(2px); }
  60%  { transform: scale(1.15) translateY(-4px); }
  100% { transform: scale(1) translateY(0); }
}

#send-btn.launching {
  animation: send-launch 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* ── 7c. Particle burst on send ── */
@keyframes particle-fly {
  0%   { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
}

.send-particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--a1);
  box-shadow: 0 0 6px var(--a1-glow);
  pointer-events: none;
  z-index: 9999;
  animation: particle-fly 0.55s ease-out both;
}

/* ── 8. Tokens/s value: flash animation when updated ── */
@keyframes value-flash {
  0%   { opacity: 0.3; transform: scale(0.88); }
  60%  { opacity: 1;   transform: scale(1.08); }
  100% { opacity: 1;   transform: scale(1); }
}

.cmd-seg-value.updated {
  animation: value-flash 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* ── 9. Sidebar toggle: lines animate on hover ── */
@keyframes line-top-hover {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(2px); }
  100% { transform: translateY(0); }
}

@keyframes line-bot-hover {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-2px); }
  100% { transform: translateY(0); }
}

#sidebar-toggle:hover svg line:first-child {
  animation: line-top-hover 0.4s ease;
}

#sidebar-toggle:hover svg line:last-child {
  animation: line-bot-hover 0.4s ease;
}

/* ── 10. Input box: animated gradient border when focused ── */
@keyframes border-rotate {
  0%   { --border-angle: 0deg; }
  100% { --border-angle: 360deg; }
}

@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.input-box:focus-within {
  border-color: transparent;
  background-clip: padding-box;
  animation: input-focus-pulse 0.4s cubic-bezier(0.4,0,0.2,1), border-rotate 3s linear infinite;
  box-shadow:
    0 0 0 1.5px var(--a1),
    0 0 0 3px var(--a1dd),
    0 4px 32px var(--a1-glow2);
}

/* ── 11. Logo mark: continuous subtle rotation shimmer ── */
@keyframes logo-shimmer {
  0%, 100% { box-shadow: 0 0 18px var(--a1-glow), 0 0 36px var(--a1-glow2); }
  50%       { box-shadow: 0 0 28px var(--a1-glow), 0 0 56px var(--a1-glow2), 0 0 80px var(--a1-glow2); }
}

.logo-mark {
  animation: logo-shimmer 3.5s ease-in-out infinite;
}

/* ── 12. Quick prompt cards: staggered hover lift with glow ── */
.quick-prompt:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.28), 0 0 0 1px var(--b2), 0 0 16px var(--a1-glow2);
}

/* ── 13. Typing dots: enhanced wave with color shift ── */
@keyframes typing-wave {
  0%, 60%, 100% { transform: translateY(0) scale(1); background: var(--t3); filter: blur(0); }
  30% { transform: translateY(-9px) scale(1.25); background: var(--a1); box-shadow: 0 0 10px var(--a1-glow); filter: blur(0.3px); }
}

.typing-dot {
  animation: typing-wave 1.5s cubic-bezier(0.4,0,0.2,1) infinite;
}

/* ── 14. Clear button: shake on hover ── */
@keyframes btn-shake {
  0%, 100% { transform: scale(1.05) rotate(0deg); }
  25%       { transform: scale(1.05) rotate(-8deg); }
  75%       { transform: scale(1.05) rotate(8deg); }
}

#clear-btn:hover {
  animation: btn-shake 0.4s ease;
}

/* ── 15. Metric pills: subtle glow when data arrives ── */
@keyframes pill-arrive {
  0%   { opacity: 0; transform: scale(0.85) translateY(4px); }
  70%  { transform: scale(1.05) translateY(-1px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }

.bot-metric-pill.has-data {

/* ── 16. Scrollbar thumb: accent on hover with transition ── */

/* ── 17. Status dot: heartbeat when READY ── */

  14%       { transform: scale(1.35); opacity: 1; }
  28%       { transform: scale(1);    opacity: 0.8; }

  70%       { transform: scale(0.85); opacity: 0.6; }
}

.status-dot:not(.generating) {
  animation: dot-heartbeat 3.5s ease-in-out infinite;
}

/* ── 18. Sidebar section labels: subtle underline grow ── */
@keyframes label-line-grow {
  from { transform: scaleX(0); transform-origin: left; }
  to   { transform: scaleX(1); transform-origin: left; }
}

.sb-section:hover .sb-label::after {
  animation: label-line-grow 0.3s ease forwards;
}

/* ── 19. Model dropdown items: slide-in stagger ── */
@keyframes opt-slide-in {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }

.model-opt {

.model-opt:nth-child(1)  { animation-delay: 0.02s; }
.model-opt:nth-child(2)  { animation-delay: 0.04s; }
.model-opt:nth-child(3)  { animation-delay: 0.06s; }
.model-opt:nth-child(4)  { animation-delay: 0.08s; }

/* ── 20. Bubble: subtle border glow on hover ── */
@keyframes bubble-hover-glow {
  from { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  to   { box-shadow: 0 4px 20px rgba(0,0,0,0.22), 0 0 12px var(--a1-glow2); }

/* ── 21. Empty logo: pulse glow in sync with dance ── */

/* ── 22. Quick prompts: staggered entrance ── */

<script>
/* ═══════════════════════════════════════════════════════════════
   GENIE CHAT — Pure Vanilla JS, no framework overhead
   Connects to Genie API Service at API_URL (port 8910)
   API matches chat.py Chat class methods
═══════════════════════════════════════════════════════════════ */

const API_URL = '';  // Requests are proxied to port 8910 by the built-in server

/* ── State ── */
const state = {
  messages: [],          // { role, content, id }
  isGenerating: false,
  selectedModel: '',
  mode: 0,
  maxTokens: 4096,
  temperature: 0.8,
  topK: 40,
  topP: 0.95,
  systemPrompt: 'You are a helpful assistant.',
  attachedFiles: [],
  theme: 'dark',
  abortController: null,
  metrics: { firstLatency: null, promptSpeed: null, evalSpeed: null },
  msgIdCounter: 0,
};

/* ── DOM refs ── */
const $ = id => document.getElementById(id);
const messagesEl   = $('messages');
const emptyState   = $('empty-state');
const msgInput     = $('msg-input');
const sendBtn      = $('send-btn');
const stopBtn      = $('stop-btn');
const fileInput    = $('file-input');
const filePreview  = $('file-preview');
// Custom model dropdown refs (created in JS below)
let _modelDropdownEl = null;
let _modelDropdownOpen = false;
const sysPrompt    = $('sys-prompt');

/* ── Markdown renderer ── */
if (typeof marked !== 'undefined' && marked.setOptions) {
  marked.setOptions({ breaks: true, gfm: true });
}

function renderMd(text) {
  if (!text) return '';
  try {
    const html = marked.parse(text);
    return html;
  } catch { return escapeHtml(text); }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Toast ── */
function showToast(msg, duration = 2200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ── Theme ── */
const THEMES = ['dark','light'];
let themeIdx = 1;

function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  state.theme = name;
  document.querySelectorAll('.theme-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.theme === name);
  });
  themeIdx = THEMES.indexOf(name);
  if (themeIdx < 0) themeIdx = 0;
}

document.querySelectorAll('.theme-swatch').forEach(s => {
  s.addEventListener('click', () => applyTheme(s.dataset.theme));
});

$('theme-cycle-btn').addEventListener('click', () => {
  themeIdx = (themeIdx + 1) % THEMES.length;
  applyTheme(THEMES[themeIdx]);
});

/* ── Sidebar toggle ── */
const sidebar = $('sidebar');
$('sidebar-toggle').addEventListener('click', () => {
  sidebar.classList.toggle('collapsed');
  const isOpen = !sidebar.classList.contains('collapsed');
  $('sidebar-toggle').classList.toggle('active', isOpen);
  $('header-brand').classList.toggle('visible', isOpen);
});

/* ── Sliders ── */
function bindSlider(slId, valId, key, fmt) {

  sl.addEventListener('input', () => {

function renderFilePreview() {
  // Revoke any previously created object URLs to avoid memory leaks
  filePreview.querySelectorAll('img[data-objurl], audio[data-objurl]').forEach(el => {
    URL.revokeObjectURL(el.dataset.objurl);
  });
  filePreview.innerHTML = '';

  if (state.attachedFiles.length === 0) {
    filePreview.classList.remove('has-files');
    return;
  }
  filePreview.classList.add('has-files');

  state.attachedFiles.forEach((f, i) => {
    const removeBtn = document.createElement('button');
    removeBtn.className = 'prev-remove';
    removeBtn.title = 'Remove';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => {
      // Revoke object URL if present
      const objEl = removeBtn.parentElement.querySelector('[data-objurl]');
      if (objEl) URL.revokeObjectURL(objEl.dataset.objurl);
      state.attachedFiles.splice(i, 1);
      renderFilePreview();
    });

    if (isImageFile(f)) {
      /* ── Image thumbnail card ── */
      const objUrl = URL.createObjectURL(f);
      const card = document.createElement('div');
      card.className = 'prev-img-card';
      const img = document.createElement('img');
      img.src = objUrl;
      img.alt = f.name;
      img.title = f.name;
      img.dataset.objurl = objUrl;
      card.appendChild(img);
      card.appendChild(removeBtn);
      filePreview.appendChild(card);

    } else if (isAudioFile(f)) {
      /* ── Audio player card ── */
      const objUrl = URL.createObjectURL(f);
      const card = document.createElement('div');
      card.className = 'prev-audio-card';

      const label = document.createElement('div');
      label.className = 'prev-audio-label';
      label.innerHTML = `
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span class="prev-audio-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      `;

      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = objUrl;
      audio.dataset.objurl = objUrl;

      card.appendChild(label);
      card.appendChild(audio);
      card.appendChild(removeBtn);
      filePreview.appendChild(card);

    } else {
      /* ── Generic file chip ── */
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `
        <span style="font-size:11px">${fileIcon(f.name)}</span>
        <span class="file-chip-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      `;
      chip.appendChild(removeBtn);
      filePreview.appendChild(chip);
    }
  });
}

function fileIcon(name) {

                py:'🐍', c:'⚙️', cpp:'⚙️', h:'⚙️', hpp:'⚙️',
                png:'🖼️', jpg:'🖼️', jpeg:'🖼️', wav:'🎵' };

}

/* ── Load models from backend ── */
// Matches chat.py Chat.getmodellist() → GET /models → data[].id
// Supports multiple response formats:
//   { "data": [{"id": "ModelName"}, ...] }  ← OpenAI-compatible
//   { "data": ["ModelName", ...] }           ← plain string array in data
//   ["ModelName", ...]                       ← top-level plain array
let _modelRetryTimer = null;

function _parseModelsFromJson(json) {
  // Format 1: { "data": [{"id": "..."}, ...] } or { "data": ["..."] }
  if (json && Array.isArray(json.data)) {
    return json.data.map(d => (d && typeof d === 'object' ? d.id : d)).filter(Boolean);
  }
  // Format 2: top-level array ["ModelName", ...]
  if (Array.isArray(json)) {
    return json.map(d => (d && typeof d === 'object' ? d.id : d)).filter(Boolean);
  }
  // Format 3: { "models": [...] }
  if (json && Array.isArray(json.models)) {
    return json.models.map(d => (d && typeof d === 'object' ? d.id : d)).filter(Boolean);
  }
  return [];
}

async function _fetchModels(url) {
  console.log(`[loadModels] Fetching: ${url}`);
  const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
  console.log(`[loadModels] Response status: ${res.status} ${res.statusText}`);
  console.log(`[loadModels] Response headers:`, Object.fromEntries(res.headers.entries()));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rawText = await res.text();
  console.log(`[loadModels] Raw response body (${rawText.length} chars):`, rawText.slice(0, 2000));
  let json;
  try {
    json = JSON.parse(rawText);
  } catch (parseErr) {
    console.error(`[loadModels] JSON parse error:`, parseErr, `\nRaw text was:`, rawText.slice(0, 500));
    throw new Error(`JSON parse failed: ${parseErr.message}`);
  }
  console.log(`[loadModels] Parsed JSON:`, json);
  const models = _parseModelsFromJson(json);
  console.log(`[loadModels] Extracted models (${models.length}):`, models);
  return models;
}

async function loadModels() {
  const statusEl = $('model-status');
  console.log('[loadModels] ===== loadModels() called =====');
  console.log('[loadModels] API_URL =', JSON.stringify(API_URL));
  console.log('[loadModels] window.location =', window.location.href);
  if (statusEl) statusEl.textContent = 'Fetching model list…';
  let models = [];
  let lastError = null;

  // Try same-origin proxy first (works when served via GenieWebUI.py)
  const proxyUrl = `${API_URL}/models`;
  console.log(`[loadModels] Step 1: trying same-origin proxy at "${proxyUrl}"`);
  try {
    models = await _fetchModels(proxyUrl);
    console.log(`[loadModels] Step 1 result: ${models.length} models`);
  } catch (e) {
    lastError = e;
    console.warn('[loadModels] Step 1 FAILED:', e.message, e);
  }

  // Fallback: fetch directly from the Genie API Service on port 8910
  if (models.length === 0) {
    const directUrl = 'http://127.0.0.1:8910/models';
    console.log(`[loadModels] Step 2: trying direct backend at "${directUrl}"`);
    try {
      models = await _fetchModels(directUrl);
      console.log(`[loadModels] Step 2 result: ${models.length} models`);
    } catch (e) {
      lastError = e;
      console.warn('[loadModels] Step 2 FAILED:', e.message, e);
    }
  }

  console.log(`[loadModels] Final models array (${models.length}):`, models);

  if (models.length > 0) {
    // Preserve user's current selection if it still exists in the list
    // Do NOT auto-select the first model — user must choose manually
    const keepModel = state.selectedModel && models.includes(state.selectedModel)
      ? state.selectedModel
      : null;
    state.selectedModel = keepModel;
    _buildModelDropdown(models, keepModel);
    updateModelTicker(keepModel);
    if (statusEl) statusEl.textContent = `${models.length} models loaded ✓`;
    console.log(`[loadModels] SUCCESS — populated dropdown with ${models.length} models, selected: "${keepModel}"`);
    // Cancel any pending retry
    if (_modelRetryTimer) { clearTimeout(_modelRetryTimer); _modelRetryTimer = null; }
    return;
  }

  // No models found — show placeholder and schedule retry
  const errMsg = lastError ? lastError.message : 'empty list';
  console.error(`[loadModels] FAILED — no models found. Last error: ${errMsg}`);
  if (statusEl) statusEl.textContent = `Cannot reach service (${errMsg}) — retrying…`;
  updateModelTicker(null);
  if (!_modelRetryTimer) {
    _modelRetryTimer = setTimeout(() => { _modelRetryTimer = null; loadModels(); }, 5000);
  }
}

function updateModelTicker(name) {
  const triggerText = $('model-trigger-text');
  const seg = $('model-seg');
  if (triggerText) {
    if (name) {
      triggerText.textContent = name;
      triggerText.title = name;
      triggerText.classList.remove('placeholder');
      if (seg) seg.classList.remove('needs-selection');
    } else {
      triggerText.textContent = '— Select a model —';
      triggerText.title = 'Click to choose a model';
      triggerText.classList.add('placeholder');
      if (seg) seg.classList.add('needs-selection');
    }
  }
}

/* ── Custom model dropdown ── */
function _buildModelDropdown(models, selectedModel) {
  // Create dropdown panel if it doesn't exist yet
  if (!_modelDropdownEl) {
    _modelDropdownEl = document.createElement('div');
    _modelDropdownEl.id = 'model-dropdown';
    document.body.appendChild(_modelDropdownEl);
  }
  // Populate options
  _modelDropdownEl.innerHTML = models.map(m => {
    const sel = m === selectedModel ? ' selected' : '';
    return `<div class="model-opt${sel}" data-value="${escapeHtml(m)}">${escapeHtml(m)}</div>`;
  }).join('');
  // Attach click handlers
  _modelDropdownEl.querySelectorAll('.model-opt').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      const modelName = opt.dataset.value;
      _selectModel(modelName);
      _closeModelDropdown();
    });
  });
}

function _openModelDropdown() {
  if (!_modelDropdownEl) return;
  const seg = $('model-seg');
  if (!seg) return;
  const rect = seg.getBoundingClientRect();
  // Position below the segment
  _modelDropdownEl.style.left = rect.left + 'px';
  _modelDropdownEl.style.top  = (rect.bottom + 6) + 'px';
  // Ensure it doesn't overflow right edge
  requestAnimationFrame(() => {
    const ddRect = _modelDropdownEl.getBoundingClientRect();
    if (ddRect.right > window.innerWidth - 8) {
      _modelDropdownEl.style.left = (window.innerWidth - ddRect.width - 8) + 'px';
    }
  });
  _modelDropdownEl.classList.add('open');
  seg.classList.add('open');
  _modelDropdownOpen = true;
}

function _closeModelDropdown() {
  if (_modelDropdownEl) _modelDropdownEl.classList.remove('open');
  const seg = $('model-seg');
  if (seg) seg.classList.remove('open');
  _modelDropdownOpen = false;
}

async function _selectModel(modelName) {
  state.selectedModel = modelName;
  updateModelTicker(modelName);
  // Update selected highlight in dropdown
  if (_modelDropdownEl) {
    _modelDropdownEl.querySelectorAll('.model-opt').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.value === modelName);
    });
  }
  const statusEl = $('model-status');
  if (!modelName) {
    if (statusEl) statusEl.textContent = '';
    return;
  }
  await refreshContextSize(false);
  showToast(`Model "${modelName}" selected`, 2500);
}

/* ── Refresh context size display ── */
async function refreshContextSize(silent = false) {
  const modelName = state.selectedModel;
  const statusEl = $('model-status');
  if (!modelName) return;
  if (!silent && statusEl) statusEl.textContent = 'Connecting to service…';
  try {
    const res = await fetch(`${API_URL}/contextsize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ modelName }),
      signal: AbortSignal.timeout(10000),
    });
    if (res.ok) {
      const data = await res.json();
      const ctxSize = parseInt(data.contextsize || data.context_size || data.max_length || 4096);
      if (ctxSize > 0) {
        const slider = $('sl-max-tokens');
        const valEl  = $('val-max-tokens');
        slider.max   = ctxSize;
        slider.value = ctxSize;
        state.maxTokens = ctxSize;
        valEl.textContent = ctxSize;
        if (statusEl) statusEl.textContent = `Loaded ✓  ctx=${ctxSize}`;
      } else {
        if (statusEl) statusEl.textContent = 'Model ready ✓';
      }
    } else {
      if (!silent && statusEl) statusEl.textContent = 'Service not responding';
    }
  } catch (e) {
    console.warn('contextsize fetch failed:', e);
    if (!silent && statusEl) statusEl.textContent = 'Service not started yet';
  }
}

              </svg>

            <button class="bot-act-btn" onclick="regenMsg('${msg.id}')">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 2.5A7 7 0 1 1 2.5 8"/>
                <polyline points="2.5 2.5 2.5 8 8 8"/>

function renderBotBubble(el, content) {
  el.innerHTML = renderMd(content);
  el.querySelectorAll('pre code').forEach(block => {
    if (typeof hljs !== 'undefined') hljs.highlightElement(block);
    const pre = block.parentElement;
    // Add language label
    if (!pre.querySelector('.code-lang-label')) {
      const langLabel = document.createElement('span');
      langLabel.className = 'code-lang-label';
      // Detect language from hljs class or data attribute
      const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
      const lang = langClass ? langClass.replace('language-', '') : '';
      if (lang && lang !== 'plaintext' && lang !== 'text') {
        langLabel.textContent = lang;
        pre.appendChild(langLabel);
      }
    }
    if (!pre.querySelector('.code-copy')) {
      const btn = document.createElement('button');
      btn.className = 'code-copy';
      btn.textContent = 'copy';
      btn.onclick = () => {
        navigator.clipboard.writeText(block.textContent);
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy', 1500);
      };
      pre.style.position = 'relative';
      pre.appendChild(btn);
    }
  });
}
